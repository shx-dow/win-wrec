name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to package, without the dev artifact suffix"
        required: true
        default: "0.1.0"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  macos:
    name: macOS release
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare release metadata
        id: release
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          git fetch origin main --prune

          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            commit="$(git rev-list -n 1 "$GITHUB_REF_NAME")"
            version="${GITHUB_REF_NAME#v}"

            if ! git merge-base --is-ancestor "$commit" origin/main; then
              echo "::error::Tag $GITHUB_REF_NAME points to $commit, which is not on origin/main."
              exit 1
            fi
          else
            commit="$(git rev-parse HEAD)"
            version="${INPUT_VERSION#v}"

            if ! git merge-base --is-ancestor "$commit" origin/main; then
              echo "::error::Manual release rehearsal must run from a commit on origin/main."
              exit 1
            fi
          fi

          echo "commit=$commit" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Show toolchain versions
        run: |
          rustc --version
          cargo --version
          swiftc --version
          xcodebuild -version

      - name: Prepare Xcode Metal toolchain
        run: |
          set -euo pipefail

          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          if ! xcrun -f metal >/dev/null 2>&1; then
            xcodebuild -downloadComponent MetalToolchain
          fi
          xcrun -f metal

      - name: Check
        run: |
          cargo fmt --check
          cargo check
          cargo test

      - name: Package unsigned dev DMG
        env:
          VERSION: ${{ steps.release.outputs.version }}
          ARTIFACT_QUALIFIER: dev
        run: ./scripts/package-macos.sh release

      - name: Package dev CLI runtime
        env:
          ARTIFACT_QUALIFIER: dev
        run: ./scripts/package-cli-macos.sh release

      - name: Verify release artifacts
        run: |
          set -euo pipefail

          case "$(uname -m)" in
            arm64) target="aarch64-apple-darwin" ;;
            x86_64) target="x86_64-apple-darwin" ;;
            *) echo "unsupported architecture: $(uname -m)" >&2; exit 1 ;;
          esac

          dmg="dist/release/wrec-${{ steps.release.outputs.version }}-dev.dmg"
          cli_archive="dist/cli/wrec-cli-$target-dev.tar.gz"

          test -f "$dmg"
          test -f "$cli_archive"
          codesign --verify --deep --strict --verbose=2 dist/release/Wrec.app
          tar -tzf "$cli_archive" | grep -qx 'wrec-cli/wrec'
          tar -tzf "$cli_archive" | grep -qx 'wrec-cli/daemon'
          tar -tzf "$cli_archive" | grep -qx 'wrec-cli/capture-engine'

          mount_dir="$(mktemp -d)"
          trap 'hdiutil detach "$mount_dir" >/dev/null 2>&1 || true; rmdir "$mount_dir" >/dev/null 2>&1 || true' EXIT
          hdiutil attach "$dmg" -nobrowse -readonly -mountpoint "$mount_dir"
          codesign --verify --deep --strict --verbose=2 "$mount_dir/Wrec.app"
          hdiutil detach "$mount_dir"
          rmdir "$mount_dir"

      - name: Publish GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh release create "$GITHUB_REF_NAME" \
            dist/release/*.dmg \
            dist/cli/*.tar.gz \
            --target "${{ steps.release.outputs.commit }}" \
            --title "$GITHUB_REF_NAME" \
            --notes "Unsigned macOS dev build for $GITHUB_REF_NAME. macOS will show an unsigned-app warning." \
            --verify-tag
